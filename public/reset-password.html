<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nueva contraseña · Reigning Blood Pressure App</title>
<link rel="icon" type="image/png" sizes="32x32" href="/shared/logos/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/shared/logos/favicon-16.png">
<link rel="apple-touch-icon" href="/shared/logos/apple-touch-icon.png">
<link rel="stylesheet" href="/shared/auth.css">
</head>
<body>
  <div class="auth-card" id="checkingCard">
    <h1 class="brand-heading"><img src="/shared/logos/logo-full-light.png" alt="Reigning Blood Pressure App" class="brand-logo"></h1>
    <p class="sub">Comprobando tu enlace…</p>
  </div>

  <div class="auth-card" id="invalidCard" style="display:none;">
    <h1 class="brand-heading"><img src="/shared/logos/logo-full-light.png" alt="Reigning Blood Pressure App" class="brand-logo"></h1>
    <p class="sub">Este enlace ya no es válido o venció (los enlaces duran 30 minutos).</p>
    <div class="switch"><a href="/forgot-password">Pedir un enlace nuevo</a></div>
  </div>

  <form class="auth-card" id="resetForm" style="display:none;">
    <h1 class="brand-heading"><img src="/shared/logos/logo-full-light.png" alt="Reigning Blood Pressure App" class="brand-logo"></h1>
    <p class="sub">Elige tu nueva contraseña.</p>
    <label>Nueva contraseña</label>
    <input type="password" id="pw1" required minlength="8">
    <label>Confirmar nueva contraseña</label>
    <input type="password" id="pw2" required minlength="8">
    <div class="err" id="err" style="display:none;"></div>
    <button type="submit" id="submitBtn">Guardar nueva contraseña</button>
  </form>

<script>
const token = window.location.pathname.split("/").filter(Boolean).pop();

async function checkToken() {
  try {
    const res = await fetch("/api/reset-token/" + encodeURIComponent(token) + "?type=patient");
    const json = await res.json();
    document.getElementById("checkingCard").style.display = "none";
    if (json.ok && json.data && json.data.valid) {
      document.getElementById("resetForm").style.display = "block";
    } else {
      document.getElementById("invalidCard").style.display = "block";
    }
  } catch (err) {
    document.getElementById("checkingCard").style.display = "none";
    document.getElementById("invalidCard").style.display = "block";
  }
}

document.getElementById("resetForm").addEventListener("submit", async e => {
  e.preventDefault();
  const errEl = document.getElementById("err");
  errEl.style.display = "none";
  const pw1 = document.getElementById("pw1").value;
  const pw2 = document.getElementById("pw2").value;
  if (pw1 !== pw2) { errEl.textContent = "Las contraseñas no coinciden."; errEl.style.display = "block"; return; }
  const btn = document.getElementById("submitBtn");
  btn.disabled = true;
  try {
    const res = await fetch("/reset-password/" + encodeURIComponent(token), {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ newPassword: pw1 }),
    });
    const json = await res.json();
    if (!json.ok) throw new Error(json.error || "no se pudo actualizar la contraseña");
    window.location.href = "/login";
  } catch (err) {
    errEl.textContent = err.message;
    errEl.style.display = "block";
    btn.disabled = false;
  }
});

checkToken();
</script>
</body>
</html>
