<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crear cuenta · Reigning Blood Pressure App</title>
<link rel="icon" type="image/png" sizes="32x32" href="/shared/logos/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/shared/logos/favicon-16.png">
<link rel="apple-touch-icon" href="/shared/logos/apple-touch-icon.png">
<link rel="stylesheet" href="/shared/auth.css">
</head>
<body>
  <form class="auth-card" id="signupForm">
    <h1 class="brand-heading"><img src="/shared/logos/logo-full-light.png" alt="Reigning Blood Pressure App" class="brand-logo"></h1>
    <p class="sub">Crea tu cuenta de paciente</p>
    <label>Nombre</label>
    <input type="text" id="name" required autofocus>
    <label>Fecha de nacimiento</label>
    <input type="date" id="birthdate">
    <label>Correo</label>
    <input type="email" id="email" required>
    <label>Contraseña</label>
    <input type="password" id="password" required minlength="8">
    <label>Confirmar contraseña</label>
    <input type="password" id="password2" required minlength="8">
    <div class="err" id="err" style="display:none;"></div>
    <button type="submit">Crear cuenta</button>
    <div class="switch">¿Ya tienes cuenta? <a href="/login">Inicia sesión</a></div>
  </form>
<script>
document.getElementById("signupForm").addEventListener("submit", async e => {
  e.preventDefault();
  const errEl = document.getElementById("err");
  errEl.style.display = "none";
  const password = document.getElementById("password").value;
  const password2 = document.getElementById("password2").value;
  if (password !== password2) {
    errEl.textContent = "Las contraseñas no coinciden.";
    errEl.style.display = "block";
    return;
  }
  try {
    const res = await fetch("/signup", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        name: document.getElementById("name").value,
        birthdate: document.getElementById("birthdate").value,
        email: document.getElementById("email").value,
        password,
      }),
    });
    const json = await res.json();
    if (!json.ok) throw new Error(json.error || "no se pudo crear la cuenta");
    window.location.href = json.redirect || "/";
  } catch (err) {
    errEl.textContent = err.message;
    errEl.style.display = "block";
  }
});
</script>
</body>
</html>
