<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Olvidé mi contraseña · Reigning Blood Pressure App</title>
<link rel="icon" type="image/png" sizes="32x32" href="/shared/logos/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/shared/logos/favicon-16.png">
<link rel="apple-touch-icon" href="/shared/logos/apple-touch-icon.png">
<link rel="stylesheet" href="/shared/auth.css">
</head>
<body>
  <form class="auth-card" id="forgotForm">
    <h1 class="brand-heading"><img src="/shared/logos/logo-full-light.png" alt="Reigning Blood Pressure App" class="brand-logo"></h1>
    <p class="sub">Escribe tu correo y te enviamos un enlace para elegir una contraseña nueva.</p>
    <label>Correo</label>
    <input type="email" id="email" required autofocus>
    <div class="err" id="err" style="display:none;"></div>
    <div class="info" id="info" style="display:none;"></div>
    <button type="submit" id="submitBtn">Enviar enlace</button>
    <div class="switch"><a href="/login">Volver a iniciar sesión</a></div>
  </form>
<script>
document.getElementById("forgotForm").addEventListener("submit", async e => {
  e.preventDefault();
  const errEl = document.getElementById("err");
  const infoEl = document.getElementById("info");
  errEl.style.display = "none";
  const btn = document.getElementById("submitBtn");
  btn.disabled = true;
  try {
    const res = await fetch("/forgot-password", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email: document.getElementById("email").value }),
    });
    const json = await res.json();
    if (!json.ok) throw new Error(json.error || "no se pudo procesar la solicitud");
    if (json.reset_url) {
      infoEl.innerHTML = `Este es tu enlace para elegir una contraseña nueva (válido 30 minutos). Cópialo y ábrelo:<br>` +
        `<code style="display:block;margin-top:6px;word-break:break-all;background:white;padding:6px 8px;border-radius:6px;">${json.reset_url}</code>` +
        `<a href="#" id="copyResetLink" style="display:inline-block;margin-top:8px;font-size:13px;color:var(--accent);font-weight:600;text-decoration:none;">Copiar enlace</a>`;
      infoEl.style.display = "block";
      document.getElementById("copyResetLink").addEventListener("click", ev => {
        ev.preventDefault();
        navigator.clipboard.writeText(json.reset_url);
        ev.target.textContent = "¡Copiado!";
      });
    } else {
      infoEl.textContent = "Si ese correo está registrado, aquí aparecería tu enlace. Verifica que lo hayas escrito bien.";
      infoEl.style.display = "block";
    }
    document.getElementById("forgotForm").querySelector("input").disabled = true;
  } catch (err) {
    errEl.textContent = err.message;
    errEl.style.display = "block";
    btn.disabled = false;
  }
});
</script>
</body>
</html>
